<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Talento PyME · Buscar Talento</title>
  <link rel="icon" href="/icon-192.png" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="header">
    <img src="/assets/logo-tp.svg" alt="Talento PyME" />
    <div class="nav">
      <a href="/dashboard.html">Panel</a>
      <a href="/buscar.html" data-role="COMPANY">Buscar Talento</a>
      <a href="/empresa.html" data-role="COMPANY">Mi Empresa</a>
      <a href="/publicar.html" data-role="COMPANY">Publicar Búsqueda</a>
      <a href="/mis-busquedas.html" data-role="COMPANY">Mis Búsquedas</a>
      <a href="/empleos.html">Empleos</a>
      <a href="#" id="btnLogout">Salir</a>
    </div>
  </div>

  <div class="wrap">
    <div class="card">
      <h2>Buscar Talento</h2>
      <div class="muted"><span class="tp-version"></span>: búsqueda por campos (pensado para escalar a miles de perfiles).</div>

      <div class="hr"></div>

      <div class="row" style="gap:12px">
        <div style="flex:1; min-width:220px">
          <label>Skill / Palabra clave</label>
          <input class="input" id="qSkill" placeholder="Ej: PLC, soldadura TIG, mantenimiento" />
        </div>
        <div style="flex:1; min-width:220px">
          <label>Título (headline)</label>
          <input class="input" id="qHeadline" placeholder="Ej: supervisor, proyectista eléctrico" />
        </div>
      </div>

      <div class="row" style="gap:12px">
        <div style="flex:1; min-width:220px">
          <label>Ciudad</label>
          <input class="input" id="qCity" placeholder="Ej: Campana" />
        </div>
        <div style="flex:1; min-width:220px">
          <label>Provincia</label>
          <input class="input" id="qProvince" placeholder="Ej: Buenos Aires" />
        </div>
      </div>

      <div class="row" style="gap:12px">
        <div style="flex:1; min-width:220px">
          <label>Sector</label>
          <select class="input" id="qSector">
            <option value="">(cualquiera)</option>
            <option value="Industria">Industria</option>
            <option value="Servicios">Servicios</option>
            <option value="Logística">Logística</option>
            <option value="Construcción">Construcción</option>
            <option value="Hotelería">Hotelería</option>
            <option value="Gastronomía">Gastronomía</option>
            <option value="Comercio">Comercio</option>
            <option value="Otros">Otros</option>
          </select>
        </div>
        <div style="flex:1; min-width:220px">
          <label>Sub-sector / Especialidad</label>
          <input class="input" id="qSubSector" placeholder="Ej: Housekeeping, Mantenimiento hotelero" />
        </div>
      </div>

      <div class="row" style="gap:10px">
        <button class="btn btn-primary" id="btnSearch">Buscar</button>
        <button class="btn" id="btnReset">Limpiar filtros</button>
        <span class="muted" id="msg"></span>
      </div>

      <div id="results"></div>
    </div>
  </div>

  <script src="/config.js?v=4.0.1"></script>
  <script src="/auth.js?v=4.0.1"></script>
  <script>
    requireAuth();
    document.getElementById("btnLogout").onclick = (e)=>{ e.preventDefault(); logout(); };

    applyRoleVisibility();
    requireRole('COMPANY');

    const qSkill = document.getElementById('qSkill');
    const qHeadline = document.getElementById('qHeadline');
    const qCity = document.getElementById('qCity');
    const qProvince = document.getElementById('qProvince');
    const qSector = document.getElementById('qSector');
    const qSubSector = document.getElementById('qSubSector');
    const msg = document.getElementById('msg');
    const results = document.getElementById('results');

    function esc(s){
      return (s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }

    async function search(){
      msg.textContent = 'Buscando…';
      results.innerHTML = '';
      try{
        const params = new URLSearchParams();
        if(qSkill.value.trim()) params.set('skill', qSkill.value.trim());
        if(qHeadline.value.trim()) params.set('headline', qHeadline.value.trim());
        if(qCity.value.trim()) params.set('city', qCity.value.trim());
        if(qProvince.value.trim()) params.set('province', qProvince.value.trim());
        if(qSector.value) params.set('sector', qSector.value);
        if(qSubSector.value.trim()) params.set('subSector', qSubSector.value.trim());

        // /search es público en esta etapa (fase 1). Más adelante lo cerramos a empresas.
        const resp = await apiFetch('/search?' + params.toString());
        const list = resp?.results || [];

        msg.textContent = list.length ? `${list.length} resultado(s)` : 'Sin resultados';

        if(!list.length) return;

        results.innerHTML = list.map(item => {
          const p = item || {};
          const r = item?.user?.resume || {};
          const skills = (p.skills||[]).slice(0,6).map(s=> s.level ? `${s.name} (${s.level})` : s.name).join(', ');
          return `
            <div class="card" style="margin-top:12px">
              <div style="font-weight:700">${esc(p.fullName || 'Candidato')}</div>
              <div class="muted">${esc(p.headline || '')}</div>
              <div class="muted">${esc([p.city, p.province].filter(Boolean).join(', '))}</div>
              <div class="muted">${esc([p.sector, p.subSector].filter(Boolean).join(' · '))}</div>
              ${skills ? `<div class="muted"><b>Skills:</b> ${esc(skills)}</div>` : ''}
              ${r.summary ? `<div class="muted" style="margin-top:6px"><b>Resumen:</b> ${esc(r.summary).slice(0,240)}${r.summary.length>240?'…':''}</div>` : ''}
            </div>
          `;
        }).join('');
      }catch(e){
        msg.textContent = e.message;
      }
    }

    document.getElementById('btnSearch').onclick = search;
    document.getElementById('btnReset').onclick = ()=>{
      qSkill.value=''; qHeadline.value=''; qCity.value=''; qProvince.value=''; qSector.value=''; qSubSector.value='';
      msg.textContent=''; results.innerHTML='';
    };
  </script>
</body>
</html>
