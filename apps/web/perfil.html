<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Talento PyME • Mi Perfil</title>
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/icon-192.png" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <img src="/icon-192.png" alt="Talento PyME" />
        <div>
          <div class="brandTitle">Talento PyME</div>
          <div class="brandSub muted">Portal de empleo • <span class="appVersion tp-version"></span></div>
        </div>
      </div>
      <nav class="nav">
        <a href="/perfil.html" class="active" data-role="CANDIDATE">Mi Perfil</a>
                <a href="/empleos.html">Empleos</a>
        <a href="/empresa.html" data-role="COMPANY">Empresa</a>
        <a href="/buscar.html" data-role="COMPANY">Buscar talento</a>
                <button class="btn small secondary" id="logoutBtn">Salir</button>
      </nav>
    </header>

    <main class="container">
      <div id="bolsaRoot"></div>
    </main>

    <script src="/config.js?v=4.0.8"></script>
    <script src="/auth.js?v=4.0.8"></script>
    <script src="/app.js?v=4.0.8"></script>
    
  <script>
    window.addEventListener("error", (e) => {
      console.error(e.error || e.message);
      if (typeof setPageError === "function") setPageError("bolsaRoot", "Error al abrir Mi Perfil", (e.error && e.error.message) ? e.error.message : (e.message || ""));
    });
    window.addEventListener("unhandledrejection", (e) => {
      console.error(e.reason);
      if (typeof setPageError === "function") setPageError("bolsaRoot", "Error al cargar datos", (e.reason && e.reason.message) ? e.reason.message : String(e.reason || ""));
    });
  </script>

  <script src="/bolsa-candidato.js?v=4.0.8"></script>
  </body>
</html>
